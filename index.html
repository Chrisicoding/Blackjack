
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .bj-wrap { padding: 1rem 0; max-width: 680px; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem; text-align: center; }
  .stat-label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .stat-val.pos { color: #1D9E75; }
  .stat-val.neg { color: #D85A30; }
  .stat-val.neu { color: var(--color-text-secondary); }
  .advice-bar { border-radius: var(--border-radius-md); padding: 0.65rem 1rem; font-size: 14px; font-weight: 500; margin-bottom: 1.25rem; text-align: center; transition: background 0.3s, color 0.3s; }
  .advice-high { background: #E1F5EE; color: #085041; }
  .advice-low  { background: #FAECE7; color: #4A1B0C; }
  .advice-neu  { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .section-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(54px, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
  .card-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 8px 4px; cursor: pointer; text-align: center; transition: background 0.15s, border-color 0.15s; }
  .card-btn:hover { background: var(--color-background-secondary); border-color: var(--color-border-secondary); }
  .card-btn:active { transform: scale(0.96); }
  .card-face { font-size: 18px; font-weight: 500; color: var(--color-text-primary); display: block; }
  .card-face.red { color: #D85A30; }
  .card-count { font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; }
  .card-count.pos { color: #1D9E75; }
  .card-count.neg { color: #D85A30; }
  .deck-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .deck-row label { font-size: 13px; color: var(--color-text-secondary); }
  select { font-size: 13px; padding: 5px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  .sys-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .sys-btn { font-size: 12px; padding: 5px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; }
  .sys-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
  .reset-btn { margin-left: auto; font-size: 12px; padding: 5px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .reset-btn:hover { color: #D85A30; border-color: #D85A30; }
  .history { display: flex; flex-wrap: wrap; gap: 5px; min-height: 28px; margin-bottom: 1rem; }
  .h-chip { font-size: 12px; padding: 2px 8px; border-radius: 99px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .h-chip.pos { background: #E1F5EE; color: #085041; border-color: #9FE1CB; }
  .h-chip.neg { background: #FAECE7; color: #4A1B0C; border-color: #F5C4B3; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1rem 0; }
  .undo-btn { font-size: 12px; padding: 5px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .undo-btn:hover { border-color: var(--color-border-primary); color: var(--color-text-primary); }
</style>

<div class="bj-wrap">
  <h2 class="sr-only">Blackjack Kartenzähler – Hi-Lo, KO und andere Systeme</h2>

  <div style="display:flex; align-items:center; gap:12px; margin-bottom:1.25rem; flex-wrap:wrap;">
    <div>
      <div class="section-label" style="margin-bottom:4px;">System</div>
      <div class="sys-row">
        <button class="sys-btn active" onclick="setSystem('hilo')">Hi-Lo</button>
        <button class="sys-btn" onclick="setSystem('ko')">KO</button>
        <button class="sys-btn" onclick="setSystem('halves')">Halves</button>
        <button class="sys-btn" onclick="setSystem('zen')">Zen</button>
      </div>
    </div>
    <div style="margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
      <div>
        <div class="section-label" style="margin-bottom:4px;">Decks</div>
        <select id="deckSel" onchange="setDecks(this.value)">
          <option value="1">1 Deck</option>
          <option value="2">2 Decks</option>
          <option value="4">4 Decks</option>
          <option value="6" selected>6 Decks</option>
          <option value="8">8 Decks</option>
        </select>
      </div>
      <div style="align-self:flex-end;">
        <button class="reset-btn" onclick="resetAll()">Neu mischen</button>
      </div>
    </div>
  </div>

  <div class="stat-grid">
    <div class="stat">
      <div class="stat-label">Running Count</div>
      <div class="stat-val" id="rc">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">True Count</div>
      <div class="stat-val" id="tc">0.0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Verbleibend</div>
      <div class="stat-val neu" id="rem">312</div>
    </div>
    <div class="stat">
      <div class="stat-label">Gesehen</div>
      <div class="stat-val neu" id="seen">0</div>
    </div>
  </div>

  <div class="advice-bar neu" id="advice">Noch keine Karten — fang an zu spielen!</div>

  <div class="section-label">Karte klicken zum Zählen</div>
  <div class="card-grid" id="cardGrid"></div>

  <hr class="divider">

  <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
    <span class="section-label" style="margin:0;">Letzte Karten</span>
    <button class="undo-btn" onclick="undo()">↩ Rückgängig</button>
  </div>
  <div class="history" id="history"></div>

  <div style="font-size:11px; color:var(--color-text-secondary); margin-top:0.5rem;" id="sysDesc"></div>
</div>

<script>
const SYSTEMS = {
  hilo:   { name:'Hi-Lo',   values:{'2':1,'3':1,'4':1,'5':1,'6':1,'7':0,'8':0,'9':0,'10':−1,'J':−1,'Q':−1,'K':−1,'A':−1}, desc:'Klassisches Hi-Lo: 2–6 = +1, 7–9 = 0, 10–A = −1. Level-1, ausbalanciert.' },
  ko:     { name:'KO',      values:{'2':1,'3':1,'4':1,'5':1,'6':1,'7':1,'8':0,'9':0,'10':−1,'J':−1,'Q':−1,'K':−1,'A':−1}, desc:'Knock-Out (KO): 2–7 = +1, 8–9 = 0, 10–A = −1. Unbalanciert – kein True Count nötig.' },
  halves: { name:'Halves',  values:{'2':0.5,'3':1,'4':1,'5':1.5,'6':1,'7':0.5,'8':0,'9':−0.5,'10':−1,'J':−1,'Q':−1,'K':−1,'A':−1}, desc:'Halves: Feinere Gewichtung für höhere Genauigkeit. Level-2, ausbalanciert.' },
  zen:    { name:'Zen',     values:{'2':1,'3':1,'4':2,'5':2,'6':2,'7':1,'8':0,'9':0,'10':−2,'J':−2,'Q':−2,'K':−2,'A':−1}, desc:'Zen Count: Level-2, ausbalanciert. Stärke auf 5er und 10er-Karten.' },
};

const CARDS = [
  {label:'2', red:false},
  {label:'3', red:false},
  {label:'4', red:false},
  {label:'5', red:false},
  {label:'6', red:false},
  {label:'7', red:false},
  {label:'8', red:false},
  {label:'9', red:false},
  {label:'10', red:false},
  {label:'J', red:false},
  {label:'Q', red:true},
  {label:'K', red:true},
  {label:'A', red:true},
];

let system = 'hilo';
let decks = 6;
let runningCount = 0;
let seenCards = 0;
let history = [];

function totalCards() { return decks * 52; }
function remaining() { return Math.max(totalCards() - seenCards, 1); }
function decksRemaining() { return remaining() / 52; }
function trueCount() { return runningCount / decksRemaining(); }

function cardValue(label) {
  return SYSTEMS[system].values[label] || 0;
}

function setSystem(s) {
  system = s;
  document.querySelectorAll('.sys-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === SYSTEMS[s].name);
  });
  document.getElementById('sysDesc').textContent = SYSTEMS[s].desc;
  renderCards();
  update();
}

function setDecks(d) {
  decks = parseInt(d);
  update();
}

function resetAll() {
  runningCount = 0;
  seenCards = 0;
  history = [];
  update();
  renderHistory();
}

function addCard(label) {
  const val = cardValue(label);
  runningCount += val;
  seenCards++;
  history.push({label, val});
  if (history.length > 20) history.shift();
  update();
  renderHistory();
}

function undo() {
  if (!history.length) return;
  const last = history.pop();
  runningCount -= last.val;
  seenCards = Math.max(0, seenCards - 1);
  update();
  renderHistory();
}

function update() {
  const rc = runningCount;
  const tc = trueCount();
  const rem = totalCards() - seenCards;

  const rcEl = document.getElementById('rc');
  rcEl.textContent = (rc > 0 ? '+' : '') + rc;
  rcEl.className = 'stat-val ' + (rc > 0 ? 'pos' : rc < 0 ? 'neg' : 'neu');

  const tcEl = document.getElementById('tc');
  tcEl.textContent = (tc >= 0 ? '+' : '') + tc.toFixed(1);
  tcEl.className = 'stat-val ' + (tc > 0 ? 'pos' : tc < 0 ? 'neg' : 'neu');

  document.getElementById('rem').textContent = Math.max(0, rem);
  document.getElementById('seen').textContent = seenCards;

  const adv = document.getElementById('advice');
  if (seenCards === 0) {
    adv.textContent = 'Noch keine Karten — fang an zu spielen!';
    adv.className = 'advice-bar advice-neu';
  } else if (tc >= 3) {
    adv.textContent = 'Starker Vorteil — Einsatz erhöhen!';
    adv.className = 'advice-bar advice-high';
  } else if (tc >= 1) {
    adv.textContent = 'Leichter Vorteil — leicht erhöhen.';
    adv.className = 'advice-bar advice-high';
  } else if (tc <= -2) {
    adv.textContent = 'Haus hat Vorteil — Mindesteinsatz spielen.';
    adv.className = 'advice-bar advice-low';
  } else if (tc < 0) {
    adv.textContent = 'Neutraler bis negativer Count — vorsichtig spielen.';
    adv.className = 'advice-bar advice-low';
  } else {
    adv.textContent = 'Ausgeglichen — Standard-Einsatz.';
    adv.className = 'advice-bar advice-neu';
  }
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  CARDS.forEach(c => {
    const val = cardValue(c.label);
    const btn = document.createElement('button');
    btn.className = 'card-btn';
    btn.onclick = () => addCard(c.label);
    const sign = val > 0 ? '+' : '';
    const cls = val > 0 ? 'pos' : val < 0 ? 'neg' : '';
    btn.innerHTML = `<span class="card-face${c.red ? ' red' : ''}">${c.label}</span><div class="card-count ${cls}">${sign}${val}</div>`;
    grid.appendChild(btn);
  });
}

function renderHistory() {
  const el = document.getElementById('history');
  el.innerHTML = '';
  [...history].reverse().forEach(h => {
    const chip = document.createElement('span');
    chip.className = 'h-chip' + (h.val > 0 ? ' pos' : h.val < 0 ? ' neg' : '');
    const sign = h.val > 0 ? '+' : '';
    chip.textContent = `${h.label} (${sign}${h.val})`;
    el.appendChild(chip);
  });
}

setSystem('hilo');
renderHistory();
update();
document.getElementById('sysDesc').textContent = SYSTEMS['hilo'].desc;
</script>
